# .github/workflows/release.yml

name: Release on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Release .deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: |
          APP_NAME="alouDebSoft"
          VERSION="1.0.${{ steps.date.outputs.date }}"

          # Arborescence du paquet .deb
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/$APP_NAME

          # Copie des fichiers du projet
          cp -r * pkg/usr/share/$APP_NAME/ 2>/dev/null || true

          # Fichier de contrôle du paquet
          cat << EOF > pkg/DEBIAN/control
          Package: $APP_NAME
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          Description: $APP_NAME - built from commit ${{ steps.vars.outputs.sha_short }}
          EOF

          # Build du .deb
          dpkg-deb --build pkg "${APP_NAME}_${VERSION}.deb"

          echo "deb_name=${APP_NAME}_${VERSION}.deb" >> $GITHUB_OUTPUT
        id: build

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "release-${{ steps.date.outputs.date }}"
          git push origin "release-${{ steps.date.outputs.date }}"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "release-${{ steps.date.outputs.date }}"
          release_name: "Release ${{ steps.date.outputs.date }}"
          body: |
            ## Release ${{ steps.date.outputs.date }}

            - **Commit:** ${{ steps.vars.outputs.sha_short }}
            - **Date:** ${{ steps.date.outputs.date }}
            - **Author:** ${{ github.actor }}
            - **Message:** ${{ steps.commit.outputs.message }}
          draft: false
          prerelease: false

      - name: Upload .deb to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.build.outputs.deb_name }}
          asset_name: ${{ steps.build.outputs.deb_name }}
          asset_content_type: application/vnd.debian.binary-package
